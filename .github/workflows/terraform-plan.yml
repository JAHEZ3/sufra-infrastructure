name: Terraform Plan

# Runs format/validate/plan for every environment on pull requests, and posts
# the plan for each environment back to the PR as a comment.

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-*.yml"

# Cancel superseded runs for the same PR.
concurrency:
  group: tf-plan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # for AWS OIDC
  pull-requests: write # to comment the plan

env:
  TF_VERSION: "1.15.7"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  fmt:
    name: Format & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: terraform fmt -check
        run: terraform fmt -check -recursive
        working-directory: terraform

  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, production]
    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        run: |
          terraform plan -input=false -no-color \
            -var-file=terraform.tfvars.example \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const env = '${{ matrix.environment }}';
            const outcome = '${{ steps.plan.outcome }}';
            let plan = fs.readFileSync(
              'terraform/environments/' + env + '/plan_output.txt', 'utf8');
            // GitHub comment hard limit is 65536 chars; keep headroom.
            const max = 60000;
            if (plan.length > max) {
              plan = plan.slice(0, max) + '\n... (truncated, see workflow logs)';
            }
            const marker = `<!-- tf-plan:${env} -->`;
            const icon = outcome === 'success' ? '✅' : '❌';
            const body = `${marker}\n### ${icon} Terraform Plan — \`${env}\`\n\n` +
              '<details><summary>Show plan</summary>\n\n```hcl\n' +
              plan + '\n```\n\n</details>';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1
