name: Terraform Apply

# Applies changes after merge to main. Environments are promoted in order:
# dev -> staging -> production. Use GitHub Environment protection rules
# (required reviewers) on `staging` and `production` to gate each apply.

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch: {} # allow manual runs

concurrency:
  group: tf-apply
  cancel-in-progress: false # never interrupt an in-flight apply

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.15.7"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  apply-dev:
    name: Apply dev
    runs-on: ubuntu-latest
    # Skips (does not fail) until the AWS_ROLE_ARN repo variable is set.
    # Downstream staging/production skip too via `needs`.
    if: ${{ vars.AWS_ROLE_ARN != '' }}
    environment: dev
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve -var-file=terraform.tfvars.example

  apply-staging:
    name: Apply staging
    runs-on: ubuntu-latest
    needs: apply-dev
    environment: staging # add required reviewers in repo settings
    defaults:
      run:
        working-directory: terraform/environments/staging
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve -var-file=terraform.tfvars.example

  apply-production:
    name: Apply production
    runs-on: ubuntu-latest
    needs: apply-staging
    environment: production # add required reviewers in repo settings
    defaults:
      run:
        working-directory: terraform/environments/production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve -var-file=terraform.tfvars.example
